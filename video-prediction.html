<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Prediction | Cattle AI</title>
    <meta name="description" content="Upload a video for cattle breed prediction." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="video">
    <div class="site-loader" id="pageLoader" aria-hidden="true">
      <div class="loader-core"></div>
      <p>Scanning Breed...</p>
    </div>

    <header class="site-header">
      <nav class="navbar container">
        <a class="logo" href="index.html">Cattle AI</a>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">☰</button>
        <div class="nav-panel" id="navPanel">
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a class="active" href="prediction.html">Prediction</a></li>
            <li><a href="analysis.html">Analysis</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a class="active" href="information.html">Information</a></li>
          </ul>
          <div class="nav-actions">
            <input type="search" class="search-input" placeholder="Search video tools" aria-label="Search" />
            <button class="back-button" type="button" onclick="goBackHome()">← Back</button>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-shell container">
      <div class="section-heading page-header">
        <span class="section-tag">Video Prediction</span>
        <h1>Analyze a cattle video</h1>
      </div>

      <section class="tool-layout glass-panel">
        <div class="tool-actions">
          <label class="primary-button file-label">
            Upload Video
            <input type="file" id="videoUpload" accept="video/*" hidden />
          </label>
          <button class="secondary-button button-element" id="extractFrameBtn" type="button">Extract Frame</button>
          <button class="secondary-button button-element" id="predictVideoBtn" type="button">Predict</button>
        </div>

        <div class="media-grid">
          <div class="preview-box">
            <video id="videoPreview" controls playsinline></video>
            <p class="placeholder-text" id="videoPlaceholder">Video preview will appear here.</p>
          </div>
          <div class="preview-box">
            <canvas id="frameCanvas"></canvas>
            <p class="placeholder-text" id="framePlaceholder">Extracted frame will appear here.</p>
          </div>
        </div>
      </section>

      <section class="result-card glass-panel" id="videoResult">
        <h2>Prediction Result</h2>
        <p class="result-breed" id="videoBreed">-</p>
        <p class="result-accuracy">Accuracy: <span id="videoAccuracy">-</span></p>
        <p class="result-note">This prediction is generated using deep learning model</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
